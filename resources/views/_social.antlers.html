<!-- Global OpenGraph -->
<meta property="og:site_name" content="Tony Messias">
<meta property="og:locale" content="en_US">
<meta property="og:title" content="Tony Messias">
<meta property="og:url" content="{{ current_url }}">
<meta property="og:image:height" content="630">
<meta property="og:image:width" content="1200">

<!-- Global Twitter -->
<meta name="twitter:site" content="@tonysmdev">
<meta name="twitter:creator" content="@tonysmdev">
<meta name="twitter:card" content="summary_large_image" />

<!-- Page-specific OG, Twitter, & Meta -->
<meta name="description" content="I'm a programmer from Brazil sharing thoughts and experiments.">
<meta property="og:description" content="I'm a programmer from Brazil sharing thoughts and experiments.">
<meta name="twitter:description" content="I'm a programmer from Brazil sharing thoughts and experiments.">
<meta name="twitter:title" content="Tony Messias">

<!-- Template-customizable Twitter -->
<meta name="twitter:image" content="{{ '/assets/site/social-card.png' | get:permalink }}?{{ id }}">

<!-- Template-customizable OpenGraph -->
<meta property="og:image" content="{{ '/assets/site/social-card.png' | get:permalink }}?{{ id }}">
