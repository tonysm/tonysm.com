title: 'Course Videos'
fields:
  -
    handle: videos
    field:
      sets:
        video:
          display: Video
          fields:
            -
              handle: video
              field:
                type: video
                listable: hidden
                display: Video
            -
              handle: description
              field:
                restrict: false
                automatic_line_breaks: true
                automatic_links: false
                escape_markup: false
                smartypants: false
                type: markdown
                listable: hidden
                display: Description
        pending_video:
          display: 'Pending Video'
          fields:
            -
              handle: description
              field:
                restrict: false
                automatic_line_breaks: true
                automatic_links: false
                escape_markup: false
                smartypants: false
                type: markdown
                listable: hidden
                display: Description
      type: replicator
      listable: hidden
      display: Videos
